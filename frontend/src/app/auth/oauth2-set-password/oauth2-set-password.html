<div class="oauth2-set-password-background" data-cy="oauth2-set-password-page">
  <form class="auth-form" data-cy="oauth2-set-password-form" (ngSubmit)="onSubmit()">
    <h2>{{ 'OAUTH2_SET_PASSWORD.TITLE' | translate }}</h2>
    <p class="subtitle">{{ 'OAUTH2_SET_PASSWORD.SUBTITLE' | translate }}</p>

    <label for="password">{{ 'OAUTH2_SET_PASSWORD.PASSWORD' | translate }}</label>
    <div class="password-container">
      <input
        id="password"
        data-cy="oauth2-password"
        [(ngModel)]="password"
        name="password"
        [type]="showPassword ? 'text' : 'password'"
        required
      />
      <button
        type="button"
        class="toggle-password"
        (click)="togglePasswordVisibility()"
        tabindex="-1"
        aria-label="Mostrar/Ocultar contraseña"
      >
        @if (showPassword) {
          <i class="fa-solid fa-eye"></i>
        } @else {
          <i class="fa-solid fa-eye-slash"></i>
        }
      </button>
    </div>

    <label for="confirmPassword">{{ 'OAUTH2_SET_PASSWORD.CONFIRM' | translate }}</label>
    <div class="password-container">
      <input
        id="confirmPassword"
        data-cy="oauth2-confirm-password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        [type]="showConfirmPassword ? 'text' : 'password'"
        required
      />
      <button
        type="button"
        class="toggle-password"
        (click)="toggleConfirmPasswordVisibility()"
        tabindex="-1"
        aria-label="Mostrar/Ocultar confirmación"
      >
        @if (showConfirmPassword) {
          <i class="fa-solid fa-eye"></i>
        } @else {
          <i class="fa-solid fa-eye-slash"></i>
        }
      </button>
    </div>

    @if (errorMessages.length > 0) {
      <div class="error">
        @for (msg of errorMessages; track $index) {
          {{ msg }}<br />
        }
      </div>
    }
    @else if (errorCode) {
      <div class="error">{{ errorCode | translate:errorArgs }}</div>
    }

    <button type="submit" data-cy="oauth2-submit">{{ 'OAUTH2_SET_PASSWORD.BUTTON' | translate }}</button>
  </form>
</div>
